parameters:
  environment: ''
  workingDirectory: ''

steps:
  - script: terraform apply -input=false -auto-approve "$(Pipeline.Workspace)/terraform-plan-${{ parameters.environment }}/${{ parameters.environment }}.tfplan"
    displayName: Terraform apply reviewed plan
    workingDirectory: ${{ parameters.workingDirectory }}

  - script: terraform output
    displayName: Post-deployment Terraform outputs
    workingDirectory: ${{ parameters.workingDirectory }}
