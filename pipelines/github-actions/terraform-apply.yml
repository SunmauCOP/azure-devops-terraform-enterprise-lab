name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Terraform environment
        required: true
        default: dev
        type: choice
        options:
          - management-hub
          - network
          - dev
          - prod

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      TF_ENV: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init
        run: terraform init -input=false -backend-config="../../backend/${TF_ENV}.backend.tfvars"
        working-directory: terraform/environments/${{ env.TF_ENV }}
      - name: Terraform plan before apply
        run: terraform plan -input=false -out="${TF_ENV}.tfplan"
        working-directory: terraform/environments/${{ env.TF_ENV }}
      - name: Terraform apply
        run: terraform apply -input=false -auto-approve "${TF_ENV}.tfplan"
        working-directory: terraform/environments/${{ env.TF_ENV }}

# Configure GitHub Environment protection rules for prod to require reviewers.
